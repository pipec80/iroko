<!doctype html>
<html>
  <body style="font-family: system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px;">
    <h2>Confirma el cambio de email</h2>
    <p>Haz clic para confirmar tu nueva dirección:</p>
    <p>
      <a
        href="{{ .SiteURL }}/es/auth/confirm?token_hash={{ .TokenHash }}&type=email_change&next=/es/dashboard/settings"
        style="display:inline-block;background:#1f2937;color:#fff;padding:12px 20px;border-radius:8px;text-decoration:none;font-weight:bold"
      >Confirmar cambio</a>
    </p>
  </body>
</html>
