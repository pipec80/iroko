<!doctype html>
<html>
  <body style="font-family: system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px">
    <h2>Has sido invitado</h2>
    <p>Te invitaron a una cuenta en SaaS Boilerplate. Acepta la invitación:</p>
    <p>
      <a
        href="{{ .SiteURL }}/es/auth/confirm?token_hash={{ .TokenHash }}&type=invite&next=/es/dashboard"

          display: inline-block;
          background: #1f2937;
          color: #fff;
          padding: 12px 20px;
          border-radius: 8px;
          text-decoration: none;
          font-weight: bold;
        "
        >Aceptar invitación</a
      >
    </p>
  </body>
</html>
