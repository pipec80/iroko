# Nightly Production Monitoring
#
# Corre tests de humo (smoke) de Playwright contra la URL de producción en Vercel.
# Detecta fallos externos al código: webhooks caídos, cambios en DNS,
# Supabase Auth fuera de servicio, redirecciones rotas, etc.
#
# Se omite el test "email is delivered" porque requiere Mailpit local.
# El resto de los tests en auth.spec.ts funcionan contra producción.
#
# Secrets requeridos (nivel repositorio):
#   SITE_URL  →  URL de producción, ej. https://iroko.vercel.app
#
# Al fallar, GitHub envía notificación por email automáticamente.
# El reporte HTML de Playwright queda disponible en Actions → Artifacts.

name: Nightly Monitoring

on:
  schedule:
    # 3 AM UTC — fuera del horario pico de Europa y América
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  smoke:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests against production
        run: |
          pnpm test:e2e --grep-invert "email is delivered"
        env:
          # PLAYWRIGHT_BASE_URL desactiva el webServer local en playwright.config.ts
          PLAYWRIGHT_BASE_URL: ${{ secrets.SITE_URL }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: nightly-playwright-report
          path: playwright-report/
          retention-days: 14
