# Nightly Production Monitoring
#
# Corre tests de humo (smoke) de Playwright contra la URL de producción en Vercel.
# Detecta fallos externos al código: webhooks caídos, cambios en DNS,
# Supabase Auth fuera de servicio, redirecciones rotas, etc.
#
# Solo corren los tests etiquetados @smoke: lecturas puras (renders, route
# guards, sanidad de assets). Los flujos que crean usuarios o necesitan
# Mailpit/service key locales NO llevan la etiqueta y quedan fuera.
#
# Secrets requeridos (nivel repositorio):
#   SITE_URL  →  URL de producción REAL, ej. https://project-a89lv.vercel.app
#                ⚠️ Si apunta a otro dominio, a un deployment inexistente o a
#                uno con Vercel Deployment Protection, TODOS los smoke tests
#                fallan con timeouts opacos — el preflight de abajo lo detecta
#                y falla con la causa explícita en la primera línea del log.
#   VERCEL_AUTOMATION_BYPASS_SECRET → Protection Bypass for Automation.
#                Vercel desafía a los runners de GitHub con su Security
#                Checkpoint (429 + challenge JS); sin este secret ni curl ni
#                Playwright pasan. Generarlo en Vercel → proyecto → Settings →
#                Deployment Protection → Protection Bypass for Automation.
#
# Al fallar, GitHub envía notificación por email automáticamente.
# El reporte HTML de Playwright queda disponible en Actions → Artifacts.

name: Nightly Monitoring

on:
  schedule:
    # 3 AM UTC — fuera del horario pico de Europa y América
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  smoke:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Preflight: verifica que SITE_URL exista y sirva la app ANTES de correr
      # Playwright. Sin esto, una URL equivocada o un deployment protegido se
      # manifiesta como 15 timeouts de 30s indistinguibles de tests rotos.
      #
      # El firewall de Vercel desafía a los runners de GitHub (429 + "Vercel
      # Security Checkpoint", un challenge de JS que curl no puede resolver).
      # El mecanismo oficial para automatización es Protection Bypass for
      # Automation: Vercel → Settings → Deployment Protection → generar secret
      # → guardarlo como VERCEL_AUTOMATION_BYPASS_SECRET en GitHub. El header
      # x-vercel-protection-bypass salta el checkpoint; x-vercel-set-bypass-cookie
      # persiste el bypass como cookie para las navegaciones de Playwright.
      - name: Preflight — production URL serves the app
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::error::El secret SITE_URL no está definido — configúralo en Settings → Secrets → Actions."
            exit 1
          fi

          bypass_args=()
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            bypass_args=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" -H "x-vercel-set-bypass-cookie: true")
            echo "Protection bypass: header presente"
          else
            echo "Protection bypass: sin secret (VERCEL_AUTOMATION_BYPASS_SECRET no definido)"
          fi

          status=$(curl -sL -o /tmp/preflight.html -w "%{http_code}" --max-time 30 "${bypass_args[@]}" "$SITE_URL/es" || echo "000")
          echo "GET $SITE_URL/es → HTTP $status"

          if [ "$status" = "429" ] && grep -qi "Security Checkpoint" /tmp/preflight.html; then
            echo "::error::El firewall de Vercel está desafiando al runner (Vercel Security Checkpoint). Fix: genera el secret en Vercel → Settings → Deployment Protection → Protection Bypass for Automation y guárdalo como VERCEL_AUTOMATION_BYPASS_SECRET en GitHub → Settings → Secrets → Actions. Si Attack Challenge Mode está activo en Vercel → Firewall, desactívalo (es solo para ataques en curso)."
            exit 1
          fi

          if [ "$status" != "200" ]; then
            echo "::error::$SITE_URL/es respondió HTTP $status — el dominio no sirve la app. Causas típicas: secret SITE_URL apunta al dominio equivocado, deployment inexistente (404), o Vercel Deployment Protection activo (401/403)."
            echo "--- Primeros 400 caracteres de la respuesta ---"
            head -c 400 /tmp/preflight.html || true
            exit 1
          fi

          # El HTML debe ser NUESTRA app, no un interstitial que responde 200.
          if ! grep -qi "iroko" /tmp/preflight.html; then
            echo "::error::$SITE_URL/es respondió 200 pero el HTML no contiene la marca de la app — probablemente sirve otra página (interstitial de Vercel u otro proyecto)."
            head -c 400 /tmp/preflight.html || true
            exit 1
          fi

          echo "✅ Producción responde y sirve la app."

      - name: Run smoke tests against production
        run: |
          pnpm test:e2e --grep "@smoke"
        env:
          # PLAYWRIGHT_BASE_URL desactiva el webServer local en playwright.config.ts
          PLAYWRIGHT_BASE_URL: ${{ secrets.SITE_URL }}
          # playwright.config.ts lo convierte en extraHTTPHeaders para saltar
          # el Security Checkpoint de Vercel en cada request de los tests.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: nightly-playwright-report
          path: playwright-report/
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 2: Advisors de base de datos (lint + security)
  #
  # No corre en CI de PRs — es análisis lento y de tendencia. Falla el
  # workflow si hay warnings de schema lint o findings de seguridad; los
  # findings de performance solo se reportan (no bloquean).
  # ─────────────────────────────────────────────
  db-advisors:
    name: Database Advisors
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          version: 2.109.1

      # Key propia por job — evita colisión con las de ci.yml.
      - name: Restore Supabase Docker image cache
        id: supabase-cache-advisors
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-advisors-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        run: if [ -f /tmp/supabase-images.tar ]; then docker load -i /tmp/supabase-images.tar; fi

      - name: Start local database
        run: |
          for i in 1 2 3; do
            supabase db start && break
            if [ "$i" = 3 ]; then echo "All 3 attempts failed"; exit 1; fi
            echo "Attempt $i failed — retrying in 15s..."
            sleep 15
          done

      - name: Save Docker images to cache
        if: steps.supabase-cache-advisors.outputs.cache-hit != 'true'
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres') \
            -o /tmp/supabase-images.tar

      - name: Schema lint (fails on warning)
        # Acotado a schemas propios — extensions (postgis/pg_partman vendored)
        # tiene decenas de warnings que no controlamos, no forman parte del
        # scope de este repo.
        run: supabase db lint --local --schema public,private,billing,audit --fail-on warning 2>&1 | tee lint-report.txt

      - name: Security advisors (fails on warn)
        run: supabase db advisors --local --type security --fail-on warn 2>&1 | tee security-advisors-report.txt

      - name: Performance advisors (report only)
        if: always()
        run: supabase db advisors --local --type performance 2>&1 | tee performance-advisors-report.txt

      - name: Upload advisor reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: db-advisor-reports
          path: |
            lint-report.txt
            security-advisors-report.txt
            performance-advisors-report.txt
          retention-days: 14
