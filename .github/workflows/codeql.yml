# CodeQL SAST — Análisis Estático de Seguridad
#
# Escanea el código TypeScript/JavaScript en busca de vulnerabilidades
# que ESLint y Zod no pueden detectar: inyecciones de segundo orden,
# path traversal, prototype pollution, credenciales hardcodeadas, etc.
#
# Gratuito para todos los repositorios en GitHub.
# Resultados disponibles en GitHub → Security → Code scanning alerts.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes a las 6 AM UTC — análisis semanal completo
    - cron: '0 6 * * 1'

env:
  NODE_VERSION: '24'

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key
          SITE_URL: https://placeholder.example.com

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: '/language:javascript-typescript'
