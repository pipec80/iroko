# CodeQL SAST — Análisis Estático de Seguridad
#
# Escanea el código TypeScript/JavaScript en busca de vulnerabilidades
# que ESLint y Zod no pueden detectar: inyecciones de segundo orden,
# path traversal, prototype pollution, credenciales hardcodeadas, etc.
#
# Gratuito para todos los repositorios en GitHub.
# Resultados disponibles en GitHub → Security → Code scanning alerts.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lunes a las 6 AM UTC — análisis semanal completo
    - cron: '0 6 * * 1'

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Build
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-key
          SITE_URL: https://placeholder.example.com

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
