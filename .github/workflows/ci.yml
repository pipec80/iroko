# CI Pipeline — Iroko SaaS Boilerplate
#
# Jobs (paralelos donde sea posible):
#   quality   → typecheck + lint + format:check + knip
#   security  → pnpm audit --prod (solo deps de producción)
#   test      → vitest con coverage report
#   db-types  → verifica que src/types/database.ts esté sincronizado con el schema
#   db-tests  → corre supabase/tests/database/*.test.sql con pgTAP
#   e2e       → Playwright contra Supabase local (solo en PRs y main)
#   build     → next build  (bloqueado por quality + test + db-types + db-tests + e2e)
#
# Secrets requeridos en GitHub → Settings → Secrets → Actions (nivel REPOSITORIO):
#   NEXT_PUBLIC_SUPABASE_URL           (URL pública del proyecto Supabase)
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (clave anon del proyecto Supabase)
#   SUPABASE_SECRET_KEY                (clave service_role del proyecto Supabase)
#   SITE_URL                           (URL del sitio, ej. https://iroko.vercel.app)
#
# Secrets adicionales SOLO en el environment "production" (main branch):
#   NEXT_PUBLIC_SENTRY_DSN             (DSN de Sentry para el cliente)
#   SENTRY_AUTH_TOKEN                  (token para subir source maps)
#
# NOTA: Los secrets de Supabase deben existir a nivel repositorio (no solo en el
# environment "production") para que los jobs de PRs puedan acceder a ellos.
# Los secrets de Sentry son opcionales en PRs — el build omite el upload de source maps.
#
# Branch protection recomendada (GitHub → Settings → Branches → main):
#   - Require status checks: quality, e2e, build
#   - Require branches to be up to date before merging
#   - Do not allow bypassing the above settings

name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'refactor/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancela runs anteriores del mismo branch/PR para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Calidad de código
  # ─────────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Prettier format check
        # Dependabot no ejecuta lint-staged — salta el check en sus PRs
        if: github.actor != 'dependabot[bot]'
        run: pnpm format:check

      - name: Dead code check (knip)
        run: pnpm knip
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Auditoría de seguridad (solo prod deps)
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # --prod omite devDependencies (vitest, eslint, etc.)
        # --audit-level=high falla solo en high/critical
        run: pnpm audit --prod --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 3: Tests unitarios con coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Verificación de tipos generados de Supabase
  # ─────────────────────────────────────────────
  db-types:
    name: Database Types
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Sync database types
        run: |
          supabase gen types --local --lang typescript --schema public,billing,audit > src/types/database.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/types/database.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/types/database.ts
            git commit -m "chore: sync database types [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Tests de base de datos (pgTAP)
  # ─────────────────────────────────────────────
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Run pgTAP tests
        run: supabase test db

  # ─────────────────────────────────────────────
  # JOB 6: Tests E2E con Playwright + Supabase local
  #
  # Solo corre en PRs a main y en pushes directos a main.
  # El job `build` lo incluye en su `needs` — pero si este job es
  # skipped (push a feature branch), GitHub Actions trata el skip
  # como éxito y `build` avanza igual.
  #
  # Claves de prueba Turnstile (siempre pasan, oficiales de Cloudflare):
  #   Site key:   1x00000000000000000000AA
  #   Secret key: 1x0000000000000000000000000000000AA
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (full stack with Auth + Mailpit)
        run: supabase start
        env:
          # Cloudflare Turnstile test secret — always passes, no real account needed
          SUPABASE_AUTH_CAPTCHA_SECRET: 1x0000000000000000000000000000000AA

      - name: Export Supabase local credentials
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          SITE_URL: http://localhost:3000
          # Cloudflare Turnstile test site key — always passes
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 7: Build de producción (gate final)
  # Bloqueado por quality + test + db-types + db-tests + e2e
  #
  # environment:
  #   - main → "production" (usa secrets del environment + secrets del repo)
  #   - PRs / feature branches → sin environment (usa solo secrets del repo)
  #     Los secrets de Sentry estarán vacíos — el build omite el source map upload.
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test, db-types, db-tests, e2e]
    # Dependabot PRs solo necesitan quality + security + tests.
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    # "production" en main (accede a Sentry secrets del environment).
    # Cadena vacía = sin environment en PRs/feature branches (GitHub Actions ignora el key).
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      # Opcionales: solo disponibles en el environment "production" (main branch).
      # En PRs, estas vars estarán vacías — el build omite el source map upload de Sentry.
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact (standalone)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1
