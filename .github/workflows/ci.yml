# CI Pipeline — Iroko SaaS Boilerplate
#
# Jobs (paralelos donde sea posible):
#   quality   → typecheck + lint + format:check + knip
#   security  → pnpm audit --prod (solo deps de producción)
#   test      → vitest con coverage report
#   db-types  → verifica que src/types/database.ts esté sincronizado con el schema
#   db-tests  → corre supabase/tests/database/*.test.sql con pgTAP
#   build     → next build  (bloqueado por quality + test + db-types + db-tests)
#
# Secrets requeridos en GitHub → Settings → Secrets → Actions:
#   NEXT_PUBLIC_SUPABASE_URL           (URL pública del proyecto Supabase)
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (clave anon del proyecto Supabase)
#   SUPABASE_SECRET_KEY                (clave service_role del proyecto Supabase)
#   SITE_URL                           (URL del sitio, ej. https://iroko.vercel.app)
#
# Branch protection recomendada (GitHub → Settings → Branches → main):
#   - Require status checks: quality, test, build
#   - Require branches to be up to date before merging
#   - Do not allow bypassing the above settings

name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'refactor/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  # Permite disparar el pipeline manualmente desde GitHub Actions UI
  workflow_dispatch:

# Cancela runs anteriores del mismo branch/PR para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  # Usar Node.js 24 en las GitHub Actions (obligatorio antes del 16-jun-2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Calidad de código
  # ─────────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Prettier format check
        # Dependabot no ejecuta lint-staged — salta el check en sus PRs
        if: github.actor != 'dependabot[bot]'
        run: pnpm format:check

      - name: Dead code check (knip)
        run: pnpm knip
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Auditoría de seguridad (solo prod deps)
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # --prod omite devDependencies (vitest, eslint, etc.)
        # --audit-level=high falla solo en high/critical
        run: pnpm audit --prod --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 3: Tests unitarios con coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Verificación de tipos generados de Supabase
  # Falla si src/types/database.ts está desincronizado con el schema.
  # Solución: pnpm supa:gen:types && git commit
  # ─────────────────────────────────────────────
  db-types:
    name: Database Types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Verify generated types match schema
        run: |
          supabase gen types typescript --local > src/types/database.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/types/database.ts; then
            echo "src/types/database.ts está desincronizado con el schema."
            echo "Ejecuta: pnpm supa:gen:types && git commit"
            git diff src/types/database.ts
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Tests de base de datos (pgTAP)
  # Corre supabase/tests/database/*.test.sql contra el schema local.
  # ─────────────────────────────────────────────
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database
        run: supabase db start

      - name: Run pgTAP tests
        run: supabase test db

  # ─────────────────────────────────────────────
  # JOB 6: Build de producción (gate final)
  # Bloqueado por quality + test + db-types + db-tests
  # Saltado en PRs de Dependabot: los secrets no están disponibles
  # en ese contexto por restricción de seguridad de GitHub.
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test, db-types, db-tests]
    # Dependabot PRs solo necesitan quality + security + tests.
    # El build requiere secrets que GitHub no pasa a Dependabot por seguridad.
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    # production → main branch | preview → feature/fix branches
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact (standalone)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1
