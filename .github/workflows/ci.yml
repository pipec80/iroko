# CI Pipeline — Iroko SaaS Boilerplate
#
# Jobs (paralelos donde sea posible):
#   quality   → typecheck + lint + format:check + knip
#   security  → pnpm audit --prod (solo deps de producción)
#   test      → vitest con coverage report
#   db-types  → verifica que src/types/database.ts esté sincronizado con el schema
#   db-tests  → corre supabase/tests/database/*.test.sql con pgTAP
#   e2e       → Playwright contra Supabase local (solo en PRs y main)
#   e2e-status → job sintético para branch protection (siempre reporta resultado)
#   build     → next build (solo en PRs y main, bloqueado por todos los anteriores)
#
# Secrets requeridos en GitHub → Settings → Secrets → Actions (nivel REPOSITORIO):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
#   SUPABASE_SECRET_KEY
#   SITE_URL
#   RESEND_API_KEY      ← añadir como Secret (permite @ en el valor)
#   FROM_EMAIL          ← añadir como Secret (permite @ en el valor)
#
# Secrets adicionales SOLO en el environment "production" (main branch):
#   NEXT_PUBLIC_SENTRY_DSN
#   SENTRY_AUTH_TOKEN
#
# Branch protection recomendada (GitHub → Settings → Branches → main):
#   - Require status checks: quality, e2e-status, build
#   - Require branches to be up to date before merging
#   - Do not allow bypassing the above settings

name: CI

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
      - 'refactor/**'
      - 'chore/**'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancela runs anteriores del mismo branch/PR para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Mínimo privilegio por defecto; db-types eleva a contents: write para poder
# commitear el sync de types.
permissions:
  contents: read

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Calidad de código
  # ─────────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: TypeScript check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      # Dependabot no ejecuta lint-staged — salta el check en sus PRs
      - name: Prettier format check
        if: github.actor != 'dependabot[bot]'
        run: pnpm format:check

      - name: Dead code check (knip)
        run: pnpm knip
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: Auditoría de seguridad (solo prod deps)
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      # --prod omite devDependencies; --audit-level=high falla solo en high/critical
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  # ─────────────────────────────────────────────
  # JOB 3: Tests unitarios con coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4: Verificación de tipos generados de Supabase
  # ─────────────────────────────────────────────
  db-types:
    name: Database Types
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      SUPABASE_ACCESS_TOKEN: dummy_token_for_local_db
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          version: 2.109.1

      # Key propia por job: cada job usa un set de imágenes distinto (db start
      # + postgres-meta acá vs db start + pg_prove en db-tests vs stack completo
      # en e2e). Con una key compartida el primero que guardaba ganaba y los
      # demás quedaban con cache incompleta para siempre (las keys son inmutables).
      - name: Restore Supabase Docker image cache
        id: supabase-cache-db-types
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-db-types-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        run: if [ -f /tmp/supabase-images.tar ]; then docker load -i /tmp/supabase-images.tar; fi

      - name: Start local database
        run: |
          for i in 1 2 3; do
            supabase db start && break
            if [ "$i" = 3 ]; then echo "All 3 attempts failed"; exit 1; fi
            echo "Attempt $i failed — retrying in 15s..."
            sleep 15
          done

      - name: Sync database types
        run: |
          supabase gen types --local --lang typescript --schema public,billing,audit > src/types/database.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/types/database.ts; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/types/database.ts
            git commit -m "chore: sync database types [skip ci]"
            git push
          fi

      # Después de gen types para incluir postgres-meta (que gen types pullea
      # bajo demanda) — antes quedaba fuera del tarball y se descargaba de
      # ghcr.io en cada run, vulnerable a rate limiting (toomanyrequests).
      - name: Save Docker images to cache
        if: steps.supabase-cache-db-types.outputs.cache-hit != 'true'
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres') \
            -o /tmp/supabase-images.tar

  # ─────────────────────────────────────────────
  # JOB 5: Tests de base de datos (pgTAP)
  # ─────────────────────────────────────────────
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          version: 2.109.1

      # Key propia por job — ver comentario en db-types.
      - name: Restore Supabase Docker image cache
        id: supabase-cache-db-tests
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-db-tests-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        run: if [ -f /tmp/supabase-images.tar ]; then docker load -i /tmp/supabase-images.tar; fi

      - name: Start local database
        run: |
          for i in 1 2 3; do
            supabase db start && break
            if [ "$i" = 3 ]; then echo "All 3 attempts failed"; exit 1; fi
            echo "Attempt $i failed — retrying in 15s..."
            sleep 15
          done

      - name: Run pgTAP tests
        run: supabase test db

      # Después de los tests para incluir pg_prove (que test db pullea bajo
      # demanda) — ver comentario equivalente en db-types.
      - name: Save Docker images to cache
        if: steps.supabase-cache-db-tests.outputs.cache-hit != 'true'
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres') \
            -o /tmp/supabase-images.tar

  # ─────────────────────────────────────────────
  # JOB 6: Tests E2E con Playwright + Supabase local
  #
  # Solo corre en PRs a main, pushes directos a main y workflow_dispatch.
  # En pushes a feature branches este job queda skipped.
  # El job sintético `e2e-status` propaga el resultado a branch protection.
  #
  # Presupuesto de tiempo (con cache caliente):
  #   supabase start + migraciones: ~3-5 min
  #   playwright install (cacheado): ~10 s
  #   next build + start (webServer): ~3-5 min
  #   tests E2E (workers: 1, retries: 2): ~4-8 min
  #   Total caliente: ~10-18 min  →  40 min cubre runs en frío
  #
  # Claves de prueba Turnstile (siempre pasan, oficiales de Cloudflare):
  #   Site key:   1x00000000000000000000AA
  #   Secret key: 1x0000000000000000000000000000000AA
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Necesario antes de `supabase start` para que GoTrue rellene {{ .SiteURL }}
      # en los templates de email. Sin esto la URL en el email es relativa y los
      # tests de confirmación no pueden extraerla.
      SITE_URL: http://localhost:3000
    if: |
      !startsWith(github.head_ref, 'dependabot/') &&
      (github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          version: 2.109.1

      # Caché de imágenes Docker de Supabase — evita la descarga de ~2 GB en cada run.
      # Key propia por job — ver comentario en db-types.
      - name: Restore Supabase Docker image cache
        id: supabase-cache-e2e
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-e2e-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        run: if [ -f /tmp/supabase-images.tar ]; then docker load -i /tmp/supabase-images.tar; fi

      - name: Start local Supabase (full stack con Auth + Mailpit)
        run: |
          for i in 1 2 3; do
            supabase start && break
            if [ "$i" = 3 ]; then echo "All 3 attempts failed"; exit 1; fi
            echo "Attempt $i failed — retrying in 15s..."
            sleep 15
          done

      - name: Save Docker images to cache
        if: steps.supabase-cache-e2e.outputs.cache-hit != 'true'
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres') \
            -o /tmp/supabase-images.tar

      - name: Export Supabase local credentials
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          SITE_URL: http://localhost:3000
          # Placeholders para pasar la validación de env.ts en CI.
          # Los E2E no envían emails reales; Mailpit captura los de auth.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_placeholder_000000000000' }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'ci@example.com' }}
          MOCK_BILLING_SECRET: ${{ secrets.MOCK_BILLING_SECRET || 'mock_secret_for_ci' }}
          # Sin NEXT_PUBLIC_TURNSTILE_SITE_KEY: CaptchaField no renderiza nada
          # y captchaReady arranca en true → botones habilitados desde el inicio.
          # Turnstile headless no dispara onSuccess aunque uses la test key.

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Job sintético para branch protection.
  # Apunta las required status checks a "E2E Status" en lugar de "E2E Tests"
  # para que "skipped" en feature branches no bloquee la protección de la rama.
  e2e-status:
    name: E2E Status
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: e2e
    if: always()
    steps:
      - name: Propagate E2E result
        run: |
          if [ "${{ needs.e2e.result }}" = "failure" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "E2E tests passed or were skipped"

  # ─────────────────────────────────────────────
  # JOB 7: Build de producción (gate final)
  # Solo corre en PRs hacia main y en pushes directos a main.
  # Bloqueado por quality + test + db-types + db-tests + e2e.
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, test, db-types, db-tests, e2e]
    if: |
      !startsWith(github.head_ref, 'dependabot/') &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_placeholder_000000000000' }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'ci@example.com' }}
      MOCK_BILLING_SECRET: ${{ secrets.MOCK_BILLING_SECRET || 'mock_secret_for_ci' }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        # Usa HEAD del branch para incluir el commit de db-types si lo hubo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install ${{ github.actor == 'dependabot[bot]' && '--no-frozen-lockfile' || '--frozen-lockfile' }}

      - name: Build
        run: pnpm build

      - name: Upload build artifact (standalone)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success()
        with:
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1
